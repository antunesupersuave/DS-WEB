<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário - Prática de Validação JS</title>

<style>
span{
color:red;
font-size:14px;
}

body{
    font-family: Arial, Helvetica, sans-serif; /* define a fonte */
    background-color: #f4f4f4; /* fundo cinza claro */
    margin: 0;
    padding: 30px;
}

h1{
    text-align: center; /* centraliza o título */
}

p{
    text-align: center;
    color: #555;
}

form{
    background: white; /* fundo do formulário */
    max-width: 400px; /* largura máxima */
    margin: auto; /* centraliza */
    padding: 25px;
    border-radius: 6px; /* cantos arredondados */
    border: 1px solid #ddd;
}

label{
    font-weight: bold;
    font-size: 14px;
}

input{
    width: 100%; /* ocupa toda largura */
    padding: 8px;
    margin-top: 4px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

input:focus{
    border-color: #007BFF; /* muda a cor ao clicar */
}

button{
    padding: 10px 15px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

button[type="submit"]{
    background-color: #007BFF; /* azul */
    color: white;
}

button[type="reset"]{
    background-color: #999; /* cinza */
    color: white;
    margin-left: 5px;
}

button:hover{
    opacity: 0.9; /* efeito ao passar o mouse */
}

span{
    color: red; /* mensagens de erro */
    font-size: 13px;
}

#resultado{
    text-align: center;
    margin-top: 20px;
    font-weight: bold;
    color: green;
}
</style>
</head>

<body>

<h1>Formulário de Cadastro</h1>

<form id="formulario">

<label>Nome:</label>
<input type="text" id="nome" placeholder="Ex: Maria Silva">
<span id="erro-nome"></span>
<br><br>

<label>E-mail:</label>
<input type="text" id="email" placeholder="Ex: maria@email.com">
<span id="erro-email"></span>
<br><br>

<label>Senha:</label>
<input type="password" id="senha" placeholder="Mínimo 8 caracteres">
<br>

<label>Confirmar senha:</label>
<input type="password" id="confirma-senha" placeholder="Repita a senha">
<span id="erro-senha"></span>
<br><br>

<label>CPF:</label>
<input type="text" id="cpf" placeholder="Ex: 000.000.000-00" maxlength="14">
<span id="erro-cpf"></span>
<br><br>

<label>Telefone:</label>
<input type="text" id="telefone" placeholder="Ex: (11) 99999-9999" maxlength="15">
<span id="erro-telefone"></span>
<br><br>

<label>CEP:</label>
<input type="text" id="cep" placeholder="Ex: 01310-100" maxlength="9">
<span id="erro-cep"></span>
<br><br>

<label>Data:</label>
<input type="text" id="data-nascimento" placeholder="Ex: 31/12/1990" maxlength="10">
<span id="erro-data"></span>
<br><br>

<label>Valor:</label>
<input type="text" id="valor" placeholder="Ex: 1.299,90">
<span id="erro-valor"></span>
<br><br>

<label>URL:</label>
<input type="text" id="url" placeholder="Ex: https://meusite.com.br">
<span id="erro-url"></span>
<br><br>

<label>Número do cartão:</label>
<input type="text" id="cartao" placeholder="Ex: 4111 1111 1111 1111">
<span id="erro-cartao"></span>
<br><br>

<button type="submit">Enviar</button>
<button type="reset">Limpar</button>

</form>

<hr>

<div id="resultado"></div>

<script src="validacao.js"></script>

</body>
</html>
